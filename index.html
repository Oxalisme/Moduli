<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Formulaires</title>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
}
button {
  width: 100%;
  padding: 20px;
  margin: 10px 0;
  font-size: 20px;
}
form {
  display: none;
  margin-top: 20px;
}
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  font-size: 16px;
}
label {
  font-weight: bold;
}
#message {
  margin-top: 20px;
  font-weight: bold;
  color: green;
}
</style>
</head>
<body>

<h2>Choisir un formulaire</h2>

<button onclick="showForm('chantier')">Chantier</button>
<button onclick="showForm('complements')">Compléments</button>

<!-- FORMULAIRE CHANTIER -->
<form id="formChantier">
  <h3>Chantier</h3>

  <label>Ton nom</label>
  <input type="text" id="collegue" required>

  <label>Nom du client</label>
  <input type="text" id="client" required>

  <label>Lieu</label>
  <input type="text" id="lieu" required>

  <label>Date</label>
  <input type="date" id="dateChantier" required>

  <label>Description</label>
  <textarea id="description" required></textarea>

  <label>Volume déchets</label>
  <input type="text" id="volume" required>

  <label>Temps utilisation broyeur</label>
  <input type="text" id="broyeur" required>

  <label>Temps utilisation machines</label>
  <input type="text" id="machines" required>

  <button type="button" onclick="sendChantier()">Envoyer</button>
</form>

<!-- FORMULAIRE COMPLEMENTS -->
<form id="formComplements">
  <h3>Compléments</h3>

  <label>Date</label>
  <input type="date" id="dateComp" required>

  <label>Détails</label>
  <textarea id="details" placeholder="km trajet, tickets repas, indemnité picnic, achats divers" required></textarea>

  <button type="button" onclick="sendComplements()">Envoyer</button>
</form>

<div id="message"></div>

<script>
const scriptURL = "https://script.google.com/macros/library/d/1mzIOEz1Wp-00g-rp08zFCQd4GuWcq55ncfqulc-n6djXOCFGieraSLW4/2";

function showForm(type) {
  document.getElementById("formChantier").style.display = "none";
  document.getElementById("formComplements").style.display = "none";

  if (type === "chantier") {
    document.getElementById("formChantier").style.display = "block";
  } else {
    document.getElementById("formComplements").style.display = "block";
  }
}

function sendChantier() {
  const data = {
    type: "chantier",
    nom: document.getElementById("collegue").value,
    client: document.getElementById("client").value,
    lieu: document.getElementById("lieu").value,
    date: document.getElementById("dateChantier").value,
    description: document.getElementById("description").value,
    volume: document.getElementById("volume").value,
    broyeur: document.getElementById("broyeur").value,
    machines: document.getElementById("machines").value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  }).then(() => {
    document.getElementById("message").innerText = "Enregistré !";
    clearChantier();
  });
}

function sendComplements() {
  const data = {
    type: "complements",
    date: document.getElementById("dateComp").value,
    details: document.getElementById("details").value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  }).then(() => {
    document.getElementById("message").innerText = "Enregistré !";
    clearComplements();
  });
}

function clearChantier() {
  document.getElementById("collegue").value = "";
  document.getElementById("client").value = "";
  document.getElementById("lieu").value = "";
  document.getElementById("dateChantier").value = "";
  document.getElementById("description").value = "";
  document.getElementById("volume").value = "";
  document.getElementById("broyeur").value = "";
  document.getElementById("machines").value = "";
}

function clearComplements() {
  document.getElementById("dateComp").value = "";
  document.getElementById("details").value = "";
}

</script>

</body>
</html>
